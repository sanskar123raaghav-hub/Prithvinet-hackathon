version: "3.9"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prithvinet
      POSTGRES_USER: prithvinet
      POSTGRES_PASSWORD: prithvinet_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/models/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # Node.js Backend API
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://prithvinet:prithvinet_dev@db:5432/prithvinet
      JWT_SECRET: prithvinet-docker-secret-change-in-prod
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - db

  # Python AI Forecasting Service
  ai-service:
    build: ./ai-service
    ports:
      - "5001:5001"

  # Next.js Frontend
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_WS_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  pgdata:
